{{ $s := .Params.partners }}
<section class="partners-section" id="partners">
  <div class="section-eyebrow">{{ $s.eyebrow }}</div>
  <h2 class="section-title">{{ $s.title_line1 }}<br/>{{ $s.title_line2 }}</h2>
  <p class="section-body">{{ $s.body }}</p>
  <div class="partners-grid">
    {{ range $i, $p := $s.items }}
    <div class="partner-card fade-up" {{ if gt $i 0 }}style="transition-delay:0.15s"{{ end }}>
      <div class="partner-label">{{ $p.label }}</div>
      <div class="partner-name">{{ $p.name }}</div>
      <div class="partner-desc">{{ $p.desc }}</div>
      {{ if or $p.photo1 $p.photo2 }}
      <div class="materials-photo-row" style="margin-top: auto; padding-top: 1.5rem;">
        {{ if $p.photo1 }}
        <figure class="materials-photo fade-up">
          <div class="img-wrapper">
            <img src="{{ $p.photo1 }}" alt="{{ $p.photo1_alt }}"/>
          </div>
          <figcaption>{{ $p.photo1_caption }}</figcaption>
        </figure>
        {{ end }}
        {{ if $p.photo2 }}
        <figure class="materials-photo fade-up" style="transition-delay:0.08s">
          <div class="img-wrapper">
            <img src="{{ $p.photo2 }}" alt="{{ $p.photo2_alt }}"/>
          </div>
          <figcaption>{{ $p.photo2_caption }}</figcaption>
        </figure>
        {{ end }}
      </div>
      {{ end }}
    </div>
    {{ end }}
  </div>
</section>
