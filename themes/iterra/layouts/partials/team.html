{{ $s := .Params.team }}
<section class="team-section" id="team">
  <div class="section-eyebrow">{{ $s.eyebrow }}</div>
  <h2 class="section-title">{{ $s.title_line1 }}<br/>{{ $s.title_line2 }}</h2>
  <div class="team-grid">
    {{ range $i, $m := $s.members }}
    <div class="team-card fade-up" {{ if gt $i 0 }}style="transition-delay:{{ mul $i 0.1 }}s"{{ end }}>
      <img src="/{{ $m.photo }}" class="team-photo" style="height:300px; width:auto; max-width:100%;" alt="{{ $m.name }}"/>
      <div class="team-name">{{ $m.name }}</div>
      <div class="team-role">{{ $m.role }}</div>
      <div class="team-bio">{{ $m.bio }}</div>
    </div>
    {{ end }}
  </div>
</section>
